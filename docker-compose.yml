services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: intervue
      POSTGRES_USER: intervue
      POSTGRES_PASSWORD: intervue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intervue -d intervue"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      HTTP_PORT: 8080
      DATABASE_URL: postgres://intervue:intervue@postgres:5432/intervue?sslmode=disable
      REDIS_ADDR: redis:6379
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
